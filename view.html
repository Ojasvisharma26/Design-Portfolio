<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Image</title>

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

  <img id="fullImage">

  <script>
    const params = new URLSearchParams(window.location.search);
    const imgSrc = params.get("img");

    document.getElementById("fullImage").src = imgSrc;
  </script>

</body>
</html>
