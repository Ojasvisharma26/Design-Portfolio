<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../css/getInTouch.css">
    <link rel="stylesheet" href="../css/typographyAnimations.css">
    <link rel="stylesheet" href="../css/3d-effects.css">

    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <!-- Icons -->
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="floating-orb floating-orb-1"></div>
    <div class="floating-orb floating-orb-2"></div>
    <div class="floating-orb floating-orb-3"></div>

    <div id="navbar"></div>

    <!-- NAVBAR TITLE -->
    <header class="header">
        <h1 class="anim-heading">Get In Touch 🎨</h1>
        <p class="anim-text">Aspiring Communication Designer passionate about visual storytelling</p>
    </header>

    <section class="contact-container">

        <!-- LEFT SIDE INFO -->
        <div class="contact-info">
            <h2 class="anim-subheading">Contact Information</h2>
            <p>
                Open to design opportunities, collaborations, and creative discussions. Feel free to reach out.
            </p>

            <div class="info-item">
                <i>📧</i>
                <span><a href="https://mail.google.com/mail/?view=cm&fs=1&to=ojasvisharma193@gmail.com" target="_blank" class="footer-social-link">Ojasvisharma193@gmail.com</a></span>
            </div>

            <div class="info-item">
                <i>📍</i>
                <span>India, Delhi</span>
            </div>

            <h3>Follow Me On</h3>

            <div class="social-links">
                <!-- Replace links with your real ones -->

                <a href="https://www.instagram.com/26_Ojasvi/" target="_blank">
                    <i class='bx bxl-instagram'></i>
                </a>

                 <a href="https://github.com/Ojasvisharma26" target="_blank">
                    <i class='bx bxl-github'></i>
                </a>

                 <a href="https://discord.com/users/943050817747959868" target="_blank">
                    <i class='bx bxl-discord'></i>
                </a>
            </div>
        </div>

        <!-- CONTACT FORM -->
        <div class="contact-form">
            <form id="contact-form">
                <h2 class="anim-subheading">Send a Message</h2>

                <input name="name" type="text" placeholder="Your Name" required>

                <input name="email" type="email" placeholder="Your Email" required>

                <input name="subject" type="text" placeholder="Subject">

                <textarea name="message" rows="5" placeholder="Your Message"></textarea>

                <button type="submit">Send Message ✨</button>
            </form>
        </div>

    </section>

    <script>
      fetch("../components/navbar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("navbar").innerHTML = data;
          window.syncThemeToggle?.();
        });
    </script>

    <script>
      fetch("../components/footer.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("footer").innerHTML = data;
        });
    </script>

    <script src="../js/CustomCursor.js"></script>
    <script src="../js/3d-parallax.js"></script>
    <script>
</script>

<script>
  lucide.createIcons();
</script>
</body>
</html>
