<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio | Ojasvi</title>

  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>

  <div id="navbar"></div>

  <header>
    <h1>🎨 My Art Gallery</h1>
  </header>

  <section class="container">
    <div class="gallery-grid" id="gallery"></div>
  </section>

  <!-- ✅ FOOTER -->
  <div id="footer"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBwBNVSsNmgJ5Y3rsZQgWtHZqP-pok7dYo",
      authDomain: "oj-art-portfolio.firebaseapp.com",
      projectId: "oj-art-portfolio",
      storageBucket: "oj-art-portfolio.firebasestorage.app",
      messagingSenderId: "485340875261",
      appId: "1:485340875261:web:bb629d032c60836afa7194",
      measurementId: "G-BPX2N36ZHN"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const gallery = document.getElementById("gallery");

    const q = query(collection(db, "images"), orderBy("createdAt", "desc"));

    onSnapshot(q, (snapshot) => {
      gallery.innerHTML = "";

      if (snapshot.empty) {
        gallery.innerHTML = "<p>No artworks yet 😅</p>";
        return;
      }

      snapshot.forEach((doc) => {
        const img = doc.data().url;

        const div = document.createElement("div");
        div.className = "gallery-item";

        div.innerHTML = `
          <a href="${img}" target="_blank">
            <img src="${img}" alt="Artwork">
          </a>
        `;

        gallery.appendChild(div);
      });
    }, (error) => {
      console.error("Firestore error:", error);
      gallery.innerHTML = "<p>Failed to load images ❌</p>";
    });

    // Navbar
    fetch("../components/navbar.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      });

    // ✅ FOOTER LOAD
    fetch("../components/footer.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });

  </script>

</body>
</html>
