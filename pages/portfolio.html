<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio | Ojasvi</title>

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/typographyAnimations.css" />
  <link rel="stylesheet" href="../css/3d-effects.css" />

  <style>
    .gallery-item img {
      cursor: default;
      transition: transform 0.3s ease;
    }

    .gallery-item img:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <!-- Background Orbs -->
  <div class="floating-orb floating-orb-1"></div>
  <div class="floating-orb floating-orb-2"></div>
  <div class="floating-orb floating-orb-3"></div>

  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Header -->
  <header>
    <h1 class="anim-heading">🎨 My Art Gallery</h1>
  </header>

  <!-- Gallery Section -->
  <section class="container">
    <h2 class="anim-subheading">My Artworks</h2>

    <div class="gallery-grid" id="gallery"></div>
  </section>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- Cursor -->
  <div class="circle" id="customCursor"></div>

  <!-- Navbar Load -->
  <script>
    fetch("../components/navbar.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
        window.syncThemeToggle?.();
      });
  </script>

  <!-- Footer Load -->
  <script>
    fetch("../components/footer.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("footer").innerHTML = data;
      });
  </script>

  <!-- 🔥 CLOUDINARY GALLERY LOGIC -->
  <script>
    const gallery = document.getElementById("gallery");

    function loadGallery() {
      gallery.innerHTML = "";

      let images = JSON.parse(localStorage.getItem("portfolioImages")) || [];

      if (images.length === 0) {
        gallery.innerHTML = "<p>No artworks yet 😅</p>";
        return;
      }

      images.forEach(src => {
        const div = document.createElement("div");
        div.className = "gallery-item";

        div.innerHTML = `
          <a href="${src}" target="_blank">
            <img src="${src}" alt="Artwork">
          </a>
        `;

        gallery.appendChild(div);
      });
    }

    loadGallery();
  </script>

  <!-- Scripts -->
  <script src="../js/CustomCursor.js"></script>
  <script src="../js/3d-parallax.js"></script>

</body>
</html>
