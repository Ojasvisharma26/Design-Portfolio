<script>
const PASSWORD = "Tatti";

const CLOUD_NAME = "dc5yun5vn";
const UPLOAD_PRESET = "orrnhlca";
const FOLDER = "portfolio"; // 🔥 important

// 🔐 LOGIN
function login() {
  const pass = document.getElementById("pass").value;

  if (pass === PASSWORD) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("uploadBox").style.display = "block";
    document.getElementById("galleryBox").style.display = "block";

    loadImages();
  } else {
    alert("Wrong password ❌");
  }
}

// 📤 UPLOAD
async function uploadImage() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select file");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", UPLOAD_PRESET);
  formData.append("folder", FOLDER); // 🔥 folder set

  try {
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    document.getElementById("preview").innerHTML =
      `<img src="${data.secure_url}">`;

    loadImages();

    alert("Uploaded 🚀");

  } catch (err) {
    console.error(err);
    alert("Upload failed ❌");
  }
}

// 📥 LOAD FROM CLOUDINARY
async function loadImages() {
  const container = document.getElementById("imageList");
  container.innerHTML = "Loading...";

  try {
    const res = await fetch(
      `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${FOLDER}.json`
    );

    const data = await res.json();

    container.innerHTML = "";

    if (!data.resources || data.resources.length === 0) {
      container.innerHTML = "<p>No images yet 😅</p>";
      return;
    }

    data.resources.reverse().forEach(img => {
      const imageUrl = `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/${img.public_id}.jpg`;

      const div = document.createElement("div");
      div.className = "gallery-item";

      div.innerHTML = `
        <img src="${imageUrl}">
      `;

      container.appendChild(div);
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = "Error loading images ❌";
  }
}
</script>
