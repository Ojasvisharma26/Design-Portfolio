<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Admin Portal</title>

  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/typographyAnimations.css">
</head>

<body>

  <div id="navbar"></div>

  <div class="admin-heading">
    <h1 class="anim-heading">Admin Portal ⚙️</h1>
  </div>

  <div class="admin-container">

    <!-- LOGIN -->
    <div class="admin-box" id="loginBox">
      <form onsubmit="login(); return false;">
        <input type="password" id="pass" placeholder="Enter Password">
        <button type="submit">Login</button>
      </form>
    </div>

    <!-- UPLOAD -->
    <div class="admin-box" id="uploadBox" style="display:none;">
      <h3>Upload Image 🎨</h3>
      <input type="file" id="fileInput" accept="image/*">
      <button onclick="uploadImage()">Upload</button>
      <div id="preview"></div>
    </div>

  </div>

  <style>
    .admin-heading { text-align:center; margin-top:40px; }
    .admin-container { display:flex; flex-direction:column; align-items:center; gap:20px; margin-top:50px; }
    .admin-box { background:rgba(255,255,255,0.5); padding:25px; border-radius:20px; width:90%; max-width:500px; text-align:center; }
    input,button { width:100%; padding:10px; margin-top:10px; border-radius:10px; border:none; }
    button { background:linear-gradient(45deg,#c9a8f0,#f9b8d6); cursor:pointer; font-weight:bold; }
    #preview img { width:100%; margin-top:10px; border-radius:10px; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 🔥 YOUR CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyBwBNVSsNmgJ5Y3rsZQgWtHZqP-pok7dYo",
      authDomain: "oj-art-portfolio.firebaseapp.com",
      projectId: "oj-art-portfolio",
      storageBucket: "oj-art-portfolio.firebasestorage.app",
      messagingSenderId: "485340875261",
      appId: "1:485340875261:web:bb629d032c60836afa7194",
      measurementId: "G-BPX2N36ZHN"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const PASSWORD = "Tatti";
    const CLOUD_NAME = "dc5yun5vn";
    const UPLOAD_PRESET = "orrnhlca";

    window.login = function () {
      const pass = document.getElementById("pass").value;

      if (pass === PASSWORD) {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("uploadBox").style.display = "block";
      } else {
        alert("Wrong password ❌");
      }
    };

    window.uploadImage = async function () {
      const file = document.getElementById("fileInput").files[0];
      if (!file) return alert("Select file");

      const formData = new FormData();
      formData.append("file", file);
      formData.append("upload_preset", UPLOAD_PRESET);
      formData.append("folder", "portfolio");

      try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        const imageUrl = data.secure_url;

        // 🔥 Save to Firebase
        await addDoc(collection(db, "images"), {
          url: imageUrl,
          createdAt: Date.now()
        });

        document.getElementById("preview").innerHTML = `<img src="${imageUrl}">`;

        alert("Uploaded & Synced 🚀");

      } catch (err) {
        console.error(err);
        alert("Upload failed ❌");
      }
    };

    // Navbar
    fetch("./components/navbar.html")
      .then(res => res.text())
      .then(data => {
        document.getElementById("navbar").innerHTML = data;
      });

  </script>

</body>
</html>
